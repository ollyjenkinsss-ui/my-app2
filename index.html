<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olly's League Companion ;)</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">
  <div style="display:flex; gap:clamp(8px,1.5vw,16px); align-items:center; flex-wrap:wrap;">
    <a href="index.html" class="active" aria-current="page">Champion List & Abilities</a>
    <a href="patch-notes.html">Patch Notes</a>
    <a href="newest-champion.html">Newest Champion</a>
  </div>
  <div class="toggle-container">
    <div class="toggle-wrapper" onclick="toggleDarkMode()">
      <div class="toggle-switch">
        <div class="toggle-knob" id="toggleKnob" aria-label="Toggle Dark Mode"><span class="icon" id="toggleIcon">🌙</span></div>
      </div>
    </div>
  </div>
</div>

<div id="championsPage" class="page">
  <div id="sidebar">
    <div class="search-wrap">
      <input id="search" placeholder="Search champion...">
      <button id="searchClear" class="search-clear" type="button" aria-label="Clear champion search">×</button>
    </div>
    <div id="roleFilters">
      <button class="role-filter active" data-role="All" onclick="setRoleFilter(this, 'All')">All</button>
      <button class="role-filter" data-role="Top" onclick="setRoleFilter(this, 'Top')">Top</button>
      <button class="role-filter" data-role="Jungle" onclick="setRoleFilter(this, 'Jungle')">Jungle</button>
      <button class="role-filter" data-role="Mid" onclick="setRoleFilter(this, 'Mid')">Mid</button>
      <button class="role-filter" data-role="Bot" onclick="setRoleFilter(this, 'Bot')">Bot</button>
      <button class="role-filter" data-role="Support" onclick="setRoleFilter(this, 'Support')">Support</button>
    </div>
    <div id="list">Loading champions…</div>
    <div id="pagination">
      <button id="prevPage" onclick="changePage(-1)">Prev</button>
      <span id="pageInfo">Page 1</span>
      <button id="nextPage" onclick="changePage(1)">Next</button>
    </div>
  </div>
  <div id="content">
    <h1>Champion Details</h1>
    <div id="details">Select a champion from the sidebar.</div>
  </div>
</div>

<!-- Load statbase data first, then extras -->
<script src="statbase-data.js"></script>
<script src="champion-extras.js"></script>
<script src="app.js"></script>
<script src="page-transitions.js"></script>
</body>
</html>
