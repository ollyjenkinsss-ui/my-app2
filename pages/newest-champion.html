<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newest Champion</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(55, 110, 255, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(167, 91, 255, 0.10), transparent 26%),
        linear-gradient(135deg, #07111f 0%, #0c1730 48%, #101d3f 100%);
      color: #eef3ff;
      min-height: 100vh;
    }

    body.light {
      background:
        radial-gradient(circle at top left, rgba(76, 132, 255, 0.10), transparent 28%),
        radial-gradient(circle at top right, rgba(159, 101, 255, 0.08), transparent 24%),
        linear-gradient(135deg, #eef3ff 0%, #e4ebff 50%, #dbe4ff 100%);
      color: #102247;
    }

    #header {
      width: 100%;
      box-sizing: border-box;
      padding: 12px clamp(12px, 2vw, 28px);
      background: rgba(10, 17, 36, 0.82);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(115, 152, 255, 0.14);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-sizing: border-box;
    }

    #header a {
      color: #cbd7ff;
      text-decoration: none;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 12px;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    #header a.active {
      background: rgba(99, 140, 255, 0.16);
      color: #fff;
    }

    body.light #header a.active {
      color: #111;
    }

    #header a:hover {
      background: rgba(99, 140, 255, 0.16);
      color: #fff;
      transform: translateY(-1px);
    }

    body.light #header {
      background: rgba(240, 244, 255, 0.88);
      border-bottom-color: rgba(93, 120, 195, 0.18);
    }

    body.light #header a {
      color: #27406f;
    }

    body.light #header a:hover {
      color: #111;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      margin-right: clamp(8px, 2vw, 20px);
    }

    .toggle-wrapper {
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .toggle-switch {
      width: 50px;
      height: 26px;
      background: #1f273d;
      border-radius: 13px;
      position: relative;
      transition: background 0.3s;
    }

    body.light .toggle-switch {
      background: #d1d1d1;
    }

    .toggle-knob {
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 1px;
      left: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s;
    }

    body.light .toggle-knob {
      transform: translateX(24px);
    }

    .container {
      width: 100%;
      max-width: min(1500px, 96vw);
      margin: 12px auto 28px;
      padding: 0 clamp(10px, 2vw, 28px);
      box-sizing: border-box;
    }

    .card {
      background: rgba(20, 30, 60, 0.8);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
    }

    body.light .card {
      background: rgba(255, 255, 255, 0.75);
      color: #111;
    }

    .top-row {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .champ-icon {
      width: 110px;
      height: 110px;
      border-radius: 14px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.08);
    }

    h1,
    h2 {
      margin: 0 0 8px;
      letter-spacing: 0.4px;
    }

    p {
      margin: 0;
      color: #dbe3ff;
    }

    body.light p {
      color: #2c2c44;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 12px;
      overflow: hidden;
      background: #080b18;
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .ability-list {
      list-style: none;
      padding: 0;
      margin: 12px 0 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .ability-list li {
      background: rgba(11, 20, 45, 0.8);
      border-radius: 10px;
      padding: 10px 12px;
    }

    body.light .ability-list li {
      background: rgba(220, 220, 220, 0.9);
    }

    .ability-key {
      color: #a5b4fc;
      font-weight: 700;
      margin-right: 6px;
    }

    body.light .ability-key {
      color: #5a5aaf;
    }

    .status {
      font-size: 20px;
      opacity: 0.95;
    }

    body.light .status {
      color: #3f3f5f;
    }

    @media (max-width: 720px) {
      #header {
        align-items: flex-start;
      }

      #header > div:first-child {
        width: 100%;
      }

      .toggle-container {
        margin-right: 0;
        margin-left: auto;
      }

      #header a {
        padding: 6px 9px;
      }
    }
  </style>
</head>

<body>
  <div id="header">
    <div style="display:flex; gap:clamp(8px,1.5vw,16px); align-items:center; flex-wrap:wrap;">
      <a href="index.html">Champion List & Abilities</a>
      <a href="patch-notes.html">Patch Notes</a>
      <a href="newest-champion.html" class="active" aria-current="page">Newest Champion</a>
      <a href="items.html">Items</a>
      <a href="match-history.html">Match History</a>
    </div>
    <div class="toggle-container">
      <div class="toggle-wrapper" onclick="toggleDarkMode()">
        <div class="toggle-switch">
          <div class="toggle-knob" id="toggleKnob" aria-label="Toggle Dark Mode"><span id="toggleIcon">🌙</span></div>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div id="status" class="status">Loading newest champion...</div>
    </div>

    <div id="championInfo" class="card" style="display:none;">
      <div class="top-row">
        <img id="champIcon" class="champ-icon" alt="Champion icon">
        <div>
          <h1 id="champName"></h1>
          <p id="champSubtitle"></p>
        </div>
      </div>
    </div>
    <div id="loreCard" class="card" style="display:none;">
      <h2>Detailed Lore Explanation</h2>
      <div id="fandomLore" style="font-size:16px; opacity:0.9;">Loading detailed explanation from Fandom...</div>
    </div>

    <div id="abilitiesCard" class="card" style="display:none;">
      <h2>What They Do</h2>
      <ul id="abilityList" class="ability-list"></ul>
    </div>
  </div>

  <script>
    const DDRAGON_VERSIONS_URL = "https://ddragon.leagueoflegends.com/api/versions.json";
    const DDRAGON_BASE_URL = "https://ddragon.leagueoflegends.com/cdn";
    const NEWEST_CANDIDATES = [
      "Zaahen",
      "Yunara",
      "Mel",
      "Ambessa",
      "Smolder",
      "Hwei",
      "Briar",
      "Naafiri",
      "Milio",
      "KSante"
    ];

    function buildSpotlightSearchUrl(championName) {
      const query = encodeURIComponent(`"${championName}" "Champion Spotlight" "League of Legends"`);
      return `https://www.youtube.com/results?search_query=${query}&sp=CAI%253D`;
    }

    function applyStoredTheme() {
      const stored = localStorage.getItem('theme');
      const isLight = stored === 'light';
      document.body.classList.toggle('light', isLight);
      const icon = document.getElementById('toggleIcon');
      if (icon) icon.textContent = isLight ? '🌞' : '🌙';
    }

    function toggleDarkMode() {
      const nextIsLight = !document.body.classList.contains('light');
      document.body.classList.toggle('light', nextIsLight);
      localStorage.setItem('theme', nextIsLight ? 'light' : 'dark');
      const icon = document.getElementById('toggleIcon');
      if (icon) icon.textContent = nextIsLight ? '🌞' : '🌙';
    }

    async function loadNewestChampion() {
      const status = document.getElementById("status");
      const champName = document.getElementById("champName");
      const champSubtitle = document.getElementById("champSubtitle");
      const champIcon = document.getElementById("champIcon");
      const abilityList = document.getElementById("abilityList");

      try {
        const versions = await (await fetch(DDRAGON_VERSIONS_URL, { cache: "no-store" })).json();
        const latestVersion = Array.isArray(versions) && versions[0] ? versions[0] : null;
        if (!latestVersion) {
          throw new Error("Could not resolve latest Data Dragon version.");
        }

        const summaryUrl = `${DDRAGON_BASE_URL}/${latestVersion}/data/en_US/champion.json`;
        const summary = await (await fetch(summaryUrl, { cache: "no-store" })).json();
        const champions = Object.values(summary?.data || {}).filter(
          (c) => c && c.id && c.name && !Number.isNaN(Number(c.key))
        );
        if (!champions.length) {
          throw new Error("No champion release data was returned.");
        }

        // Data Dragon has no releaseDate. Prefer known recent releases if present,
        // then fall back to highest numeric key.
        const newest =
          NEWEST_CANDIDATES.map((id) => champions.find((c) => c.id === id)).find(Boolean) ||
          champions.reduce((latest, champ) =>
            Number(champ.key) > Number(latest.key) ? champ : latest
          );

        const detailsUrl = `${DDRAGON_BASE_URL}/${latestVersion}/data/en_US/champion/${newest.id}.json`;
        const detailsPayload = await (await fetch(detailsUrl, { cache: "no-store" })).json();
        const details = detailsPayload?.data?.[newest.id];
        if (!details) {
          throw new Error("Champion details could not be loaded.");
        }

        champName.textContent = "Zaahen";
        champSubtitle.textContent = "The Unbroken Darkin";
        champIcon.src = "https://static.bigbrain.gg/assets/lol/riot_static/16.6.1/img/champion/Zaahen.webp";

        const abilities = [];
        if (details.passive && details.passive.name) {
          abilities.push({ key: "Passive", name: details.passive.name });
        }
        if (Array.isArray(details.spells)) {
          const keys = ["Q", "W", "E", "R"];
          details.spells.forEach((spell, i) => {
            abilities.push({ key: keys[i] || "Skill", name: spell.name || "Unknown Ability" });
          });
        }

        abilityList.innerHTML = abilities
          .map((a) => `<li><span class="ability-key">${a.key}</span>${a.name}</li>`)
          .join("");

        document.getElementById("championInfo").style.display = "block";
        document.getElementById("abilitiesCard").style.display = "block";
        document.getElementById("loreCard").style.display = "block";
        status.textContent = `${details.name} loaded successfully! Loading expanded Fandom lore...`;

        // Use hardcoded lore for Zaahen as requested
        const zaahenLore = `
      <p style="margin-bottom:12px; line-height:1.6;"><strong>Zaahen, The Unbroken Darkin</strong>, is a fallen god wielding both divine and profane power. He is a noble Darkin who notably turned against his own kind during the Great Darkin War. Unlike other corrupted Darkin, Zaahen fought alongside mortals and willingly chose to be sealed away after witnessing the rampant ruin caused by his brethren. He feared the destructive potential of his true Darkin form and the possibility of losing complete control.</p>
      <p style="margin-bottom:12px; line-height:1.6;">Once sealed within his powerful glaive to stave off madness, he is now free with a noble heart and vicious purpose. Zaahen fights an eternal war within himself to prevent Runeterra's ruin. He actively hunts other corrupted Darkin to stop their rampage, all while battling the very blood magic that threatens to consume his sanity.</p>
    `;
        document.getElementById("fandomLore").innerHTML = zaahenLore;
        status.textContent = `${details.name || "Zaahen"} loaded successfully with full lore!`;

      } catch (error) {
        console.error(error);
        status.textContent = "Could not load newest champion data right now. Refresh and try again.";
      }
    }

    applyStoredTheme();
    loadNewestChampion();
  </script>
  <script src="/assets/js/page-transitions.js"></script>
</body>

</html>
