<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item Details — League Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/style.css">
<style>
  body {
    background:
      radial-gradient(circle at top left, rgba(55, 110, 255, 0.12), transparent 28%),
      radial-gradient(circle at top right, rgba(167, 91, 255, 0.10), transparent 26%),
      linear-gradient(135deg, #07111f 0%, #0c1730 48%, #101d3f 100%);
    color: #eef3ff;
  }
  body.light {
    background:
      radial-gradient(circle at top left, rgba(76, 132, 255, 0.10), transparent 28%),
      radial-gradient(circle at top right, rgba(159, 101, 255, 0.08), transparent 24%),
      linear-gradient(135deg, #eef3ff 0%, #e4ebff 50%, #dbe4ff 100%);
    color: #102247;
  }
  #header {
    padding: 12px clamp(12px, 2vw, 28px);
    background: rgba(10, 17, 36, 0.82);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(115, 152, 255, 0.14);
  }
  body.light #header {
    background: rgba(240, 244, 255, 0.88);
    border-bottom-color: rgba(93, 120, 195, 0.18);
  }
  #header a {
    color: #cbd7ff;
    padding: 8px 12px;
    border-radius: 12px;
    transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
  }
  #header a:hover,
  #header a.active {
    background: rgba(99, 140, 255, 0.16);
    color: #fff;
    transform: translateY(-1px);
  }
  body.light #header a { color: #27406f; }
  body.light #header a:hover,
  body.light #header a.active {
    color: #102247;
    background: rgba(89, 126, 232, 0.14);
  }

  .item-detail-card {
    background: linear-gradient(160deg, #0e1630 0%, #101a33 100%);
    border: 1px solid rgba(119, 163, 255, 0.22);
    border-radius: 16px;
    padding: 24px;
    max-width: 700px;
    margin: 20px auto;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
  }
  .item-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .item-header img {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    border: 1px solid rgba(170, 196, 255, 0.5);
    background: #0a0f27;
  }
  .item-header-meta h1 {
    margin: 0 0 8px;
    color: #f4f7ff;
    font-size: 1.8rem;
  }
  .item-header-meta .cost {
    color: #a5d6ff;
    font-size: 1.1rem;
    font-weight: 600;
  }
  .item-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .item-tag {
    font-size: 0.8rem;
    font-weight: 600;
    color: #d5e2ff;
    background: rgba(92, 122, 218, 0.3);
    border: 1px solid rgba(122, 172, 255, 0.3);
    border-radius: 12px;
    padding: 4px 10px;
  }
  .item-description {
    color: #d6e3ff;
    line-height: 1.5;
    font-size: 1rem;
    margin-bottom: 20px;
  }
  .item-stats, .item-build-path {
    margin-top: 20px;
  }
  .item-stats h2, .item-build-path h2 {
    font-size: 1.2rem;
    color: #eef3ff;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(119, 163, 255, 0.2);
    padding-bottom: 5px;
  }
  .item-stats-list {
    list-style: none;
    padding: 0;
    color: #c9d5ff;
    font-size: 0.95rem;
  }
  .item-build-path-icons {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .item-build-path-icons img {
    width: 42px;
    height: 42px;
    border-radius: 6px;
    background: #0a0f27;
    border: 1px solid rgba(170, 196, 255, 0.4);
  }
  body.light .item-detail-card { background: #f4f6ff; border-color: #b9c5e8; }
  body.light .item-header-meta h1, body.light .item-stats h2, body.light .item-build-path h2 { color: #112347; }
  body.light .item-description { color: #333; }
  body.light .item-header-meta .cost { color: #125ba8; }

  @media (max-width: 720px) {
    #header {
      align-items: flex-start;
    }

    #header > div:first-child {
      width: 100%;
    }

    .toggle-container {
      margin-right: 0;
      margin-left: auto;
    }

    .item-detail-card {
      padding: 14px;
      margin: 10px auto;
    }

    .item-header {
      align-items: flex-start;
      gap: 12px;
    }

    .item-header img {
      width: 64px;
      height: 64px;
    }
  }
</style>
</head>
<body>
  <div id="header">
    <div style="display:flex; gap:clamp(8px,1.5vw,16px); align-items:center; flex-wrap:wrap;">
      <a href="index.html">Champion List & Abilities</a>
      <a href="patch-notes.html">Patch Notes</a>
      <a href="newest-champion.html">Newest Champion</a>
      <a href="items.html">Items</a>
      <a href="match-history.html">Match History</a>
    </div>
    <div class="toggle-container">
      <div class="toggle-wrapper" onclick="toggleDarkMode()">
        <div class="toggle-switch"><div class="toggle-knob" id="toggleKnob" aria-label="Toggle Dark Mode"><span id="toggleIcon">🌙</span></div></div>
      </div>
    </div>
  </div>

  <div class="page">
    <div id="itemDetailCard" class="item-detail-card" style="display:none;">
      <div class="item-header">
        <img id="itemIcon" src="" alt="Item icon">
        <div class="item-header-meta">
          <h1 id="itemName"></h1>
          <div id="itemCost" class="cost"></div>
          <div id="itemTags" class="item-tags"></div>
        </div>
      </div>
      <div id="itemDescription" class="item-description"></div>
      <div id="itemStats" class="item-stats">
        <h2>Stats</h2>
        <ul id="itemStatsList" class="item-stats-list"></ul>
      </div>
      <div id="itemBuildPath" class="item-build-path">
        <h2>Build Path</h2>
        <div id="itemBuildPathIcons" class="item-build-path-icons"></div>
      </div>
    </div>
    <div id="loadingStatus" style="text-align:center; color: #f2f3f9;">Loading item details...</div>
  </div>

<script>
const DDRAGON_VERSIONS_URL = 'https://ddragon.leagueoflegends.com/api/versions.json';
const DDRAGON_BASE = 'https://ddragon.leagueoflegends.com/cdn';

function applyStoredTheme() {
  const stored = localStorage.getItem('theme');
  const isLight = stored === 'light';
  document.body.classList.toggle('light', isLight);
  const icon = document.getElementById('toggleIcon');
  if (icon) icon.textContent = isLight ? '🌞' : '🌙';
}

function toggleDarkMode() {
  const nextIsLight = !document.body.classList.contains('light');
  document.body.classList.toggle('light', nextIsLight);
  localStorage.setItem('theme', nextIsLight ? 'light' : 'dark');
  const icon = document.getElementById('toggleIcon');
  if (icon) icon.textContent = nextIsLight ? '🌞' : '🌙';
}

function toReadableStatKey(key) {
  const map = {
    FlatHPPoolMod: 'Health', FlatHPRegenMod: 'HP regen', FlatMPPoolMod: 'Mana', FlatMPRegenMod:'Mana regen', FlatArmorMod:'Armor', FlatSpellBlockMod:'MR', FlatAttackSpeedMod:'AS%', FlatMovementSpeedMod:'MS', FlatCritChanceMod:'Crit%', FlatCritDamageMod:'Crit dmg', FlatMagicDamageMod:'Bonus AP', FlatPhysicalDamageMod:'Bonus AD', PercentAttackSpeedMod:'AS%', PercentMovementSpeedMod:'MS%', PercentArmorMod:'Armor%', PercentSpellBlockMod:'MR%', PercentHPPoolMod:'Health%', PercentMPPoolMod:'Mana%', PercentSpellVampMod:'Spell vamp%', PercentLifeStealMod:'Lifesteal%'
  };
  return map[key] || key.replace(/([a-z])([A-Z])/g, '$1 $2');
}

async function loadItemDetails() {
  applyStoredTheme();
  const statusEl = document.getElementById('loadingStatus');
  const cardEl = document.getElementById('itemDetailCard');
  const params = new URLSearchParams(window.location.search);
  const itemId = params.get('id');

  if (!itemId) {
    statusEl.textContent = 'No item ID provided.';
    return;
  }

  try {
    const versions = await (await fetch(DDRAGON_VERSIONS_URL)).json();
    const version = versions[0];
    const itemUrl = `${DDRAGON_BASE}/${version}/data/en_US/item.json`;
    const itemPayload = await (await fetch(itemUrl)).json();
    
    // Log for debugging
    console.log('Looking for item ID:', itemId);
    console.log('Available item IDs:', Object.keys(itemPayload.data).slice(0, 10));
    
    // Ensure itemId is a string for proper lookup
    const stringItemId = String(itemId);
    const itemData = itemPayload.data[stringItemId];

    if (!itemData) {
      statusEl.textContent = `Item with ID "${itemId}" not found.`;
      return;
    }

    document.title = `${itemData.name} — League Companion`;
    document.getElementById('itemIcon').src = `${DDRAGON_BASE}/${version}/img/item/${itemData.image.full}`;
    document.getElementById('itemName').textContent = itemData.name;
    document.getElementById('itemCost').textContent = `Cost: ${itemData.gold.total}`;
    document.getElementById('itemDescription').innerHTML = itemData.description;

    const tagsContainer = document.getElementById('itemTags');
    tagsContainer.innerHTML = (itemData.tags || []).map(tag => `<span class="item-tag">${tag}</span>`).join('');

    const statsList = document.getElementById('itemStatsList');
    statsList.innerHTML = Object.entries(itemData.stats)
      .filter(([k, v]) => Number(v) > 0)
      .map(([k, v]) => `<li>${toReadableStatKey(k)}: +${v}</li>`).join('');

    const buildPathContainer = document.getElementById('itemBuildPathIcons');
    if (itemData.from && itemData.from.length) {
      buildPathContainer.innerHTML = itemData.from.map(id => `<img src="${DDRAGON_BASE}/${version}/img/item/${id}.png" alt="Component item">`).join('');
    } else {
      document.getElementById('itemBuildPath').style.display = 'none';
    }

    statusEl.style.display = 'none';
    cardEl.style.display = 'block';

  } catch (err) {
    console.error('Failed to load item details:', err);
    statusEl.textContent = 'Error loading item data. Please try again.';
  }
}

loadItemDetails();
</script>
<script src="/assets/js/page-transitions.js"></script>
</body>
</html>
