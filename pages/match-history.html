<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match History</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    .history-layout {
      display: grid;
      grid-template-columns: minmax(260px, 320px) minmax(0, 1fr);
      gap: 14px;
      width: 100%;
      min-height: 0;
    }

    .panel {
      background: linear-gradient(180deg, rgba(14, 23, 49, 0.88), rgba(9, 16, 34, 0.92));
      border: 1px solid rgba(118, 155, 255, 0.16);
      box-shadow: 0 14px 34px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.035);
      backdrop-filter: blur(14px);
      border-radius: 24px;
    }

    body.light .panel {
      background: linear-gradient(180deg, rgba(247, 249, 255, 0.98), rgba(237, 242, 255, 0.96));
      border-color: rgba(93, 120, 195, 0.16);
      box-shadow: 0 12px 30px rgba(61, 88, 150, 0.10), inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .history-sidebar {
      padding: 14px;
      overflow-y: auto;
    }

    .history-main {
      padding: 14px;
      overflow-y: auto;
      min-width: 0;
    }

    .search-stack {
      display: grid;
      gap: 10px;
    }

    .input-group {
      display: grid;
      gap: 6px;
    }

    .input-group label {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #c7d2fe;
    }

    body.light .input-group label {
      color: #4c4c6a;
    }

    .player-input {
      width: 100%;
      box-sizing: border-box;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(165,180,252,0.18);
      background: rgba(30,40,70,0.6);
      color: #fff;
      font: inherit;
      font-size: 16px;
    }

    body.light .player-input {
      background: rgba(200,200,220,0.45);
      color: #111;
      border-color: rgba(90,90,175,0.18);
    }

    .player-input::placeholder {
      color: rgba(255,255,255,0.65);
    }

    body.light .player-input::placeholder {
      color: rgba(0,0,0,0.45);
    }

    .primary-btn {
      border: 1px solid rgba(165,180,252,0.38);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(20,30,60,0.7);
      color: #eef3ff;
      font: inherit;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      background: rgba(99, 140, 255, 0.18);
      border-color: rgba(165,180,252,0.65);
    }

    .primary-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    body.light .primary-btn {
      background: rgba(220,220,240,0.6);
      color: #102247;
      border-color: rgba(90,90,175,0.3);
    }

    .helper-text {
      margin: 0;
      font-size: 13px;
      opacity: 0.85;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1;
    }

    .warning-banner {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(250, 204, 21, 0.12);
      border: 1px solid rgba(250, 204, 21, 0.18);
      color: #fde68a;
      font-weight: 600;
    }

    body.light .warning-banner {
      color: #7c5b00;
      background: rgba(250, 204, 21, 0.14);
      border-color: rgba(202, 138, 4, 0.2);
    }

    .overview-shell {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .player-header-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(165,180,252,0.2);
      background: linear-gradient(160deg, rgba(27, 39, 75, 0.72), rgba(14, 24, 52, 0.82));
      box-shadow: 0 10px 22px rgba(0,0,0,0.24);
    }

    body.light .player-header-card {
      background: linear-gradient(160deg, rgba(243, 247, 255, 0.96), rgba(231, 238, 255, 0.9));
      border-color: rgba(90,90,175,0.2);
      box-shadow: 0 10px 22px rgba(61, 88, 150, 0.12);
    }

    .player-header-icon {
      width: 68px;
      height: 68px;
      border-radius: 16px;
      object-fit: cover;
      border: 1px solid rgba(165,180,252,0.22);
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .player-header-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .player-id {
      margin: 0;
      font-size: 28px;
      line-height: 1;
      word-break: break-word;
    }

    .player-meta-line {
      font-size: 14px;
      opacity: 0.88;
    }

    .player-rank-chip {
      justify-self: start;
      margin-top: 4px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(165,180,252,0.28);
      background: rgba(30,40,70,0.5);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    body.light .player-rank-chip {
      background: rgba(200,200,220,0.45);
      border-color: rgba(90,90,175,0.22);
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
    }

    .overview-card {
      padding: 10px;
      border-radius: 14px;
      background: rgba(18, 30, 60, 0.6);
      border: 1px solid rgba(165,180,252,0.16);
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
    }

    .overview-card:hover {
      transform: translateY(-1px);
      border-color: rgba(165,180,252,0.34);
      box-shadow: 0 10px 20px rgba(0,0,0,0.24);
    }

    body.light .overview-card {
      background: rgba(255,255,255,0.7);
      border-color: rgba(90,90,175,0.16);
      box-shadow: 0 6px 16px rgba(61, 88, 150, 0.1);
    }

    .overview-card-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .9px;
      opacity: .82;
    }

    .overview-card-value {
      margin-top: 5px;
      font-size: 24px;
      line-height: 1;
      font-weight: 700;
      word-break: break-word;
    }

    .subsection-box {
      border-radius: 14px;
      border: 1px solid rgba(165,180,252,0.16);
      background: rgba(18, 30, 60, 0.5);
      padding: 10px;
    }

    body.light .subsection-box {
      background: rgba(255,255,255,0.68);
      border-color: rgba(90,90,175,0.16);
    }

    .subsection-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1;
    }

    .top-champs-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }

    .top-champ-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid rgba(165,180,252,0.14);
      background: rgba(30,40,70,0.48);
      min-width: 0;
    }

    body.light .top-champ-item {
      background: rgba(200,200,220,0.4);
      border-color: rgba(90,90,175,0.16);
    }

    .top-champ-item img {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .top-champ-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-champ-games {
      font-size: 12px;
      opacity: 0.82;
    }

    .recent-form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .form-pill {
      min-width: 28px;
      height: 26px;
      padding: 0 8px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .form-pill.win {
      background: rgba(34,197,94,0.16);
      color: #86efac;
      border-color: rgba(34,197,94,0.28);
    }

    .form-pill.loss {
      background: rgba(239,68,68,0.14);
      color: #fca5a5;
      border-color: rgba(239,68,68,0.25);
    }

    body.light .form-pill.win {
      color: #166534;
    }

    body.light .form-pill.loss {
      color: #991b1b;
    }

    .match-list {
      display: grid;
      gap: 10px;
    }

    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .pagination-info {
      font-size: 13px;
      opacity: 0.85;
      margin-right: 4px;
    }

    .page-btn {
      border: 1px solid rgba(165,180,252,0.35);
      border-radius: 10px;
      padding: 7px 10px;
      background: rgba(20,30,60,0.7);
      color: #eef3ff;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    body.light .page-btn {
      background: rgba(220,220,240,0.6);
      color: #102247;
      border-color: rgba(90,90,175,0.3);
    }

    .match-card {
      position: relative;
      display: grid;
      grid-template-columns: 120px 96px minmax(0, 1fr) 120px;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 18px;
      background: linear-gradient(145deg,#1c2238,#10172a);
      border: 1px solid rgba(165,180,252,0.12);
    }

    body.light .match-card {
      background: linear-gradient(145deg,#eceff8,#dde4f7);
      border-color: rgba(90,90,175,0.12);
      color: #111;
    }

    .match-card.win {
      box-shadow: inset 4px 0 0 #22c55e;
    }

    .match-card.loss {
      box-shadow: inset 4px 0 0 #ef4444;
    }

    .result-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-width: 74px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
    }

    .result-pill.win {
      background: rgba(34, 197, 94, 0.16);
      color: #86efac;
    }

    .result-pill.loss {
      background: rgba(239, 68, 68, 0.14);
      color: #fca5a5;
    }

    body.light .result-pill.win {
      color: #166534;
    }

    body.light .result-pill.loss {
      color: #991b1b;
    }

    .match-meta {
      display: grid;
      gap: 6px;
    }

    .match-meta .small {
      font-size: 13px;
      opacity: 0.8;
    }

    .lp-change {
      font-size: 13px;
      font-weight: 700;
      opacity: 0.95;
    }

    .lp-change.gain {
      color: #86efac;
    }

    .lp-change.loss {
      color: #fca5a5;
    }

    body.light .lp-change.gain {
      color: #166534;
    }

    body.light .lp-change.loss {
      color: #991b1b;
    }

    .timeline-popover {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: calc(100% + 8px);
      z-index: 10;
      padding: 10px;
      border-radius: 12px;
      background: rgba(8, 13, 27, 0.96);
      border: 1px solid rgba(165,180,252,0.28);
      box-shadow: 0 14px 24px rgba(0,0,0,0.42);
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: opacity .14s ease, transform .14s ease;
    }

    .match-card.timeline-below .timeline-popover {
      top: calc(100% + 8px);
      bottom: auto;
    }

    .match-card:hover .timeline-popover,
    .match-card:focus-within .timeline-popover {
      opacity: 1;
      transform: translateY(0);
    }

    .timeline-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .3px;
      opacity: 0.95;
    }

    .timeline-points {
      display: flex;
      gap: 8px;
      overflow-x: auto;
    }

    .timeline-point {
      min-width: 92px;
      padding: 8px;
      border-radius: 10px;
      background: rgba(28, 40, 80, 0.56);
      border: 1px solid rgba(165,180,252,0.18);
      font-size: 12px;
      line-height: 1.35;
    }

    .timeline-status {
      font-size: 12px;
      opacity: 0.85;
    }

    .champ-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .champ-cell img {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      flex-shrink: 0;
      object-fit: cover;
    }

    .champ-name {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .kda-cell {
      display: grid;
      gap: 4px;
      text-align: center;
    }

    .kda-main {
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
    }

    .kda-ratio,
    .cs-line {
      font-size: 14px;
      opacity: 0.85;
    }

    .items-cell {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .items-cell img,
    .item-placeholder {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(165,180,252,0.12);
    }

    .item-placeholder {
      display: inline-block;
    }

    .empty-state {
      padding: 18px;
      border-radius: 18px;
      background: rgba(20,30,60,0.42);
      border: 1px solid rgba(165,180,252,0.12);
      font-size: 18px;
      font-weight: 600;
    }

    body.light .empty-state {
      background: rgba(255,255,255,0.58);
      border-color: rgba(90,90,175,0.14);
    }

    .skeleton-list {
      display: grid;
      gap: 10px;
    }

    .skeleton-card {
      height: 110px;
      border-radius: 18px;
      border: 1px solid rgba(165,180,252,0.12);
      background: linear-gradient(
        110deg,
        rgba(30, 40, 70, 0.6) 8%,
        rgba(62, 84, 130, 0.48) 18%,
        rgba(30, 40, 70, 0.6) 33%
      );
      background-size: 200% 100%;
      animation: shimmer 1.1s linear infinite;
    }

    body.light .skeleton-card {
      background: linear-gradient(
        110deg,
        rgba(211, 219, 241, 0.7) 8%,
        rgba(236, 241, 252, 0.9) 18%,
        rgba(211, 219, 241, 0.7) 33%
      );
      background-size: 200% 100%;
    }

    @keyframes shimmer {
      to {
        background-position-x: -200%;
      }
    }

    @media (max-width: 980px) {
      .history-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
      .match-card {
        grid-template-columns: 1fr;
        text-align: left;
      }

      .kda-cell {
        text-align: left;
      }

      .items-cell {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div id="header">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <a href="index.html">Champion List & Abilities</a>
      <a href="patch-notes.html">Patch Notes</a>
      <a href="newest-champion.html">Newest Champion</a>
      <a href="items.html">Items</a>
      <a href="match-history.html" class="active">Match History</a>
    </div>

    <div class="toggle-container">
      <div class="toggle-wrapper" id="themeToggle" role="button" tabindex="0" aria-label="Toggle theme">
        <div class="toggle-switch">
          <div class="toggle-knob">
            <span class="icon">☀️</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main class="page">
    <div class="history-layout">
      <aside class="panel history-sidebar">
        <div class="search-stack">
          <div>
            <h2 class="section-title">Search Player</h2>
            <p class="helper-text">Enter a Riot ID to load profile and recent matches.</p>
          </div>

          <div class="input-group">
            <label for="gameName">Game Name</label>
            <input id="gameName" class="player-input" type="text" placeholder="ICE IS COMING" value="ICE IS COMING">
          </div>

          <div class="input-group">
            <label for="tagLine">Tag Line</label>
            <input id="tagLine" class="player-input" type="text" placeholder="OJ9" value="OJ9">
          </div>

          <button id="loadBtn" class="primary-btn">Search</button>
          <p id="statusText" class="helper-text">Ready.</p>
        </div>

      </aside>

      <section class="panel history-main">
        <div id="playerOverviewWrap" class="overview-shell" style="display:none;">
          <div id="playerHeader"></div>
          <div id="overviewCards"></div>
          <div id="topChampions"></div>
          <div id="recentForm"></div>
        </div>
        <h2 class="section-title">Recent Matches</h2>
        <div id="rankedWarningWrap"></div>
        <div id="matchesContainer" class="match-list">
          <div class="empty-state">Search for a player to load recent games.</div>
        </div>
        <div id="paginationBar" class="pagination-bar" style="display:none;">
          <span id="paginationInfo" class="pagination-info">Page 1 of 1</span>
          <button id="prevPageBtn" class="page-btn" type="button">Previous</button>
          <button id="nextPageBtn" class="page-btn" type="button">Next</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    const body = document.body;
    const themeToggle = document.getElementById('themeToggle');
    const gameNameInput = document.getElementById('gameName');
    const tagLineInput = document.getElementById('tagLine');
    const loadBtn = document.getElementById('loadBtn');
    const statusText = document.getElementById('statusText');
    const rankedWarningWrap = document.getElementById('rankedWarningWrap');
    const playerOverviewWrap = document.getElementById('playerOverviewWrap');
    const playerHeader = document.getElementById('playerHeader');
    const overviewCards = document.getElementById('overviewCards');
    const topChampions = document.getElementById('topChampions');
    const recentForm = document.getElementById('recentForm');
    const matchesContainer = document.getElementById('matchesContainer');
    const paginationBar = document.getElementById('paginationBar');
    const paginationInfo = document.getElementById('paginationInfo');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');

    let currentPage = 1;
    let totalPages = 1;
    const PAGE_SIZE = 5;
    let currentPuuid = '';
    const timelineCache = new Map();

    let DRAGON_VERSION = '15.6.1';

    function applyTheme(saved) {
      if (saved === 'light') body.classList.add('light');
      else body.classList.remove('light');
    }

    applyTheme(localStorage.getItem('theme'));

    function toggleTheme() {
      body.classList.toggle('light');
      localStorage.setItem('theme', body.classList.contains('light') ? 'light' : 'dark');
    }

    themeToggle.addEventListener('click', toggleTheme);
    themeToggle.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleTheme();
      }
    });

    function queueLabel(queueId) {
      const map = {
        420: 'Ranked Solo/Duo',
        440: 'Ranked Flex',
        400: 'Normal Draft',
        430: 'Normal Blind',
        450: 'ARAM',
        490: 'Quickplay',
        1700: 'Arena'
      };
      return map[queueId] || `Queue ${queueId ?? '-'}`;
    }

    function formatDuration(seconds) {
      if (!seconds && seconds !== 0) return '-';
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}m ${String(secs).padStart(2, '0')}s`;
    }

    function rankText(entry) {
      if (!entry) return 'Unranked';
      return `${entry.tier} ${entry.rank} · ${entry.leaguePoints} LP`;
    }

    function getPrimaryRank(ranked) {
      const rankedList = Array.isArray(ranked) ? ranked : [];
      return rankedList.find((entry) => entry?.queueType === 'RANKED_SOLO_5x5')
        || rankedList.find((entry) => entry?.queueType === 'RANKED_FLEX_SR')
        || null;
    }

    function kdaRatio(match) {
      const deaths = Number(match.deaths || 0);
      const kills = Number(match.kills || 0);
      const assists = Number(match.assists || 0);
      if (deaths === 0) return 'Perfect KDA';
      return `${((kills + assists) / deaths).toFixed(2)} KDA`;
    }

    function championIconUrl(name) {
      return `https://ddragon.leagueoflegends.com/cdn/${DRAGON_VERSION}/img/champion/${name}.png`;
    }

    function itemIconUrl(id) {
      return `https://ddragon.leagueoflegends.com/cdn/${DRAGON_VERSION}/img/item/${id}.png`;
    }

    function profileIconUrl(id) {
      return `https://ddragon.leagueoflegends.com/cdn/${DRAGON_VERSION}/img/profileicon/${id}.png`;
    }

    async function initDragonVersion() {
      try {
        const response = await fetch('https://ddragon.leagueoflegends.com/api/versions.json', { cache: 'no-store' });
        const versions = await response.json();
        if (Array.isArray(versions) && versions[0]) {
          DRAGON_VERSION = versions[0];
        }
      } catch (_) {
        // Keep fallback version.
      }
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderWarning(message) {
      rankedWarningWrap.innerHTML = message
        ? `<div class="warning-banner">${escapeHtml(message)}</div>`
        : '';
    }

    function isValidRecentMatch(match) {
      return !!(match && typeof match === 'object' && typeof match.win === 'boolean');
    }

    function getMostPlayedChampions(matches, limit = 3) {
      const validMatches = Array.isArray(matches) ? matches.filter(isValidRecentMatch) : [];
      const counts = new Map();

      validMatches.forEach((match) => {
        const champ = String(match.championName || '').trim();
        if (!champ) return;
        counts.set(champ, (counts.get(champ) || 0) + 1);
      });

      return Array.from(counts.entries())
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]))
        .slice(0, Math.max(1, limit))
        .map(([championName, games]) => ({
          championName,
          games,
          icon: championIconUrl(championName)
        }));
    }

    function getCurrentStreak(matches) {
      const validMatches = Array.isArray(matches) ? matches.filter(isValidRecentMatch) : [];
      if (!validMatches.length) return 'No streak';

      const latestResult = validMatches[0].win;
      let count = 0;

      for (const match of validMatches) {
        if (match.win !== latestResult) break;
        count += 1;
      }

      if (!count) return 'No streak';
      return `${count}${latestResult ? 'W' : 'L'}`;
    }

    function buildPlayerOverview(data) {
      const validMatches = Array.isArray(data?.recentMatches) ? data.recentMatches.filter(isValidRecentMatch) : [];
      const recentWins = validMatches.filter((m) => m.win).length;
      const recentLosses = validMatches.length - recentWins;
      const recentWinRate = validMatches.length ? Math.round((recentWins / validMatches.length) * 100) : 0;

      const totals = validMatches.reduce((acc, match) => {
        acc.kills += Number(match.kills || 0);
        acc.deaths += Number(match.deaths || 0);
        acc.assists += Number(match.assists || 0);
        return acc;
      }, { kills: 0, deaths: 0, assists: 0 });

      const divisor = validMatches.length || 1;
      const avgKills = totals.kills / divisor;
      const avgDeaths = totals.deaths / divisor;
      const avgAssists = totals.assists / divisor;

      const primaryRank = getPrimaryRank(data?.ranked);
      const top3 = getMostPlayedChampions(validMatches, 3);
      const mostPlayedChampion = top3[0]?.championName || 'None';

      return {
        rank: primaryRank ? `${primaryRank.tier} ${primaryRank.rank}` : 'Unranked',
        lp: primaryRank ? `${Number(primaryRank.leaguePoints || 0)} LP` : '0 LP',
        rankedRecord: primaryRank
          ? `${Number(primaryRank.wins || 0)}W / ${Number(primaryRank.losses || 0)}L`
          : '0W / 0L',
        recentWinRate: `${recentWinRate}%`,
        averageKda: `${avgKills.toFixed(1)} / ${avgDeaths.toFixed(1)} / ${avgAssists.toFixed(1)}`,
        mostPlayedChampion,
        currentStreak: getCurrentStreak(validMatches),
        topChampions: top3,
        recentMatches: validMatches
      };
    }

    function renderPlayerHeader(data) {
      const account = data?.account || {};
      const summoner = data?.summoner || {};
      const primaryRank = getPrimaryRank(data?.ranked);
      const queueLabel = primaryRank?.queueType === 'RANKED_SOLO_5x5'
        ? 'Solo/Duo'
        : primaryRank?.queueType === 'RANKED_FLEX_SR'
          ? 'Flex'
          : 'Unranked';

      const riotId = `${account.gameName || 'Unknown'}#${account.tagLine || '----'}`;
      const iconId = Number(summoner.profileIconId) || 29;
      const iconSrc = profileIconUrl(iconId);
      const fallbackIcon = profileIconUrl(29);

      playerHeader.innerHTML = `
        <article class="player-header-card">
          <img class="player-header-icon" src="${iconSrc}" alt="${escapeHtml(account.gameName || 'Player')} icon" loading="lazy" onerror="this.onerror=null;this.src='${fallbackIcon}';">
          <div class="player-header-main">
            <h3 class="player-id">${escapeHtml(riotId)}</h3>
            <div class="player-meta-line">Level ${Number(summoner.summonerLevel || 0)}</div>
            <div class="player-rank-chip">${escapeHtml(queueLabel)} · ${escapeHtml(primaryRank ? `${primaryRank.tier} ${primaryRank.rank}` : 'Unranked')}</div>
          </div>
        </article>
      `;
    }

    function renderRecentForm(matches) {
      const validMatches = Array.isArray(matches) ? matches.filter(isValidRecentMatch).slice(0, 10) : [];
      const pills = validMatches.map((match) => `
        <span class="form-pill ${match.win ? 'win' : 'loss'}">${match.win ? 'W' : 'L'}</span>
      `).join('');

      recentForm.innerHTML = `
        <div class="subsection-box">
          <h3 class="subsection-title">Recent Form</h3>
          <div class="recent-form-row">
            ${pills || '<span class="helper-text">No recent form available.</span>'}
          </div>
        </div>
      `;
    }

    function renderPlayerOverview(overview) {
      overviewCards.innerHTML = `
        <div class="overview-grid">
          <article class="overview-card">
            <div class="overview-card-label">Rank</div>
            <div class="overview-card-value">${escapeHtml(overview.rank)}</div>
          </article>
          <article class="overview-card">
            <div class="overview-card-label">LP</div>
            <div class="overview-card-value">${escapeHtml(overview.lp)}</div>
          </article>
          <article class="overview-card">
            <div class="overview-card-label">Ranked W/L</div>
            <div class="overview-card-value">${escapeHtml(overview.rankedRecord)}</div>
          </article>
          <article class="overview-card">
            <div class="overview-card-label">Recent Win Rate</div>
            <div class="overview-card-value">${escapeHtml(overview.recentWinRate)}</div>
          </article>
          <article class="overview-card">
            <div class="overview-card-label">Average KDA</div>
            <div class="overview-card-value">${escapeHtml(overview.averageKda)}</div>
          </article>
          <article class="overview-card">
            <div class="overview-card-label">Most Played Champion</div>
            <div class="overview-card-value">${escapeHtml(overview.mostPlayedChampion)}</div>
          </article>
          <article class="overview-card">
            <div class="overview-card-label">Current Streak</div>
            <div class="overview-card-value">${escapeHtml(overview.currentStreak)}</div>
          </article>
        </div>
      `;

      const topChampionItems = overview.topChampions.map((champ) => `
        <div class="top-champ-item">
          <img src="${champ.icon}" alt="${escapeHtml(champ.championName)}" loading="lazy" onerror="this.style.visibility='hidden';">
          <div style="min-width:0;">
            <div class="top-champ-name">${escapeHtml(champ.championName)}</div>
            <div class="top-champ-games">${champ.games} game${champ.games === 1 ? '' : 's'}</div>
          </div>
        </div>
      `).join('');

      topChampions.innerHTML = `
        <div class="subsection-box">
          <h3 class="subsection-title">Top Champions</h3>
          <div class="top-champs-list">
            ${topChampionItems || '<span class="helper-text">No champion data available.</span>'}
          </div>
        </div>
      `;

      renderRecentForm(overview.recentMatches);
      playerOverviewWrap.style.display = 'grid';
    }

    function renderPagination(meta) {
      if (!meta || !meta.totalPages || meta.totalPages <= 1) {
        paginationBar.style.display = 'none';
        return;
      }

      paginationBar.style.display = 'flex';
      paginationInfo.textContent = `Page ${meta.page} of ${meta.totalPages} · ${meta.totalMatches} matches`;
      prevPageBtn.disabled = meta.page <= 1;
      nextPageBtn.disabled = meta.page >= meta.totalPages;
    }

    function renderMatches(data) {
      const recentMatches = Array.isArray(data.recentMatches) ? data.recentMatches : [];

      if (!recentMatches.length) {
        matchesContainer.innerHTML = `<div class="empty-state">No recent match details available yet. Add <strong>recentMatches</strong> to your backend response.</div>`;
        return;
      }

      matchesContainer.innerHTML = recentMatches.map(match => {
        const resultClass = match.win ? 'win' : 'loss';
        const resultText = match.win ? 'Victory' : 'Defeat';
        const lpChange = Number.isFinite(match.lpChange) ? Number(match.lpChange) : null;
        const lpHtml = lpChange === null
          ? ''
          : `<div class="lp-change ${lpChange >= 0 ? 'gain' : 'loss'}">${lpChange >= 0 ? '+' : ''}${lpChange} LP</div>`;

        const items = [match.item0, match.item1, match.item2, match.item3, match.item4, match.item5, match.item6]
          .map(id => Number(id || 0));

        const itemsHtml = items.map(id => {
          if (!id) return `<span class="item-placeholder"></span>`;
          return `<img src="${itemIconUrl(id)}" alt="Item ${id}" loading="lazy">`;
        }).join('');

        return `
          <article class="match-card ${resultClass}" data-match-id="${escapeHtml(match.matchId)}">
            <div class="match-meta">
              <span class="result-pill ${resultClass}">${resultText}</span>
              <div class="small">${escapeHtml(queueLabel(match.queueId))}</div>
              <div class="small">${escapeHtml(formatDuration(match.gameDuration))}</div>
              ${lpHtml}
            </div>

            <div class="champ-cell">
              <img src="${championIconUrl(match.championName)}" alt="${escapeHtml(match.championName)}" loading="lazy">
              <div>
                <div class="champ-name">${escapeHtml(match.championName)}</div>
                <div class="small">Match ${escapeHtml(match.matchId)}</div>
              </div>
            </div>

            <div class="kda-cell">
              <div class="kda-main">${match.kills}/${match.deaths}/${match.assists}</div>
              <div class="kda-ratio">${escapeHtml(kdaRatio(match))}</div>
              <div class="cs-line">${escapeHtml(String(match.cs ?? 0))} CS</div>
            </div>

            <div class="items-cell">
              ${itemsHtml}
            </div>

            <div class="timeline-popover" aria-hidden="true">
              <div class="timeline-status">Hovering match… loading timeline</div>
            </div>
          </article>
        `;
      }).join('');
    }

    function timelineHtml(payload) {
      if (!payload || !Array.isArray(payload.milestones) || !payload.milestones.length) {
        return `<div class="timeline-status">No timeline milestones available.</div>`;
      }

      const points = payload.milestones.map((m) => `
        <div class="timeline-point">
          <div><strong>${m.minute}m</strong></div>
          <div>Lvl ${m.level}</div>
          <div>${m.cs} CS</div>
          <div>${m.totalGold}g</div>
        </div>
      `).join('');

      return `
        <div class="timeline-head">
          <span>KDA ${payload.kda?.kills ?? 0}/${payload.kda?.deaths ?? 0}/${payload.kda?.assists ?? 0}</span>
          <span>Timeline</span>
        </div>
        <div class="timeline-points">${points}</div>
      `;
    }

    async function ensureTimeline(matchCard) {
      if (!matchCard || !currentPuuid) return;

      const matchId = matchCard.dataset.matchId;
      if (!matchId) return;

      const popover = matchCard.querySelector('.timeline-popover');
      if (!popover) return;

      if (timelineCache.has(matchId)) {
        popover.innerHTML = timelineHtml(timelineCache.get(matchId));
        return;
      }

      if (matchCard.dataset.timelineLoading === '1') return;
      matchCard.dataset.timelineLoading = '1';
      popover.innerHTML = `<div class="timeline-status">Loading timeline…</div>`;

      try {
        const response = await fetch(`/api/match-timeline/${encodeURIComponent(matchId)}?puuid=${encodeURIComponent(currentPuuid)}`);
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to load timeline');
        timelineCache.set(matchId, data);
        popover.innerHTML = timelineHtml(data);
      } catch (error) {
        popover.innerHTML = `<div class="timeline-status">${escapeHtml(error.message || 'Timeline unavailable')}</div>`;
      } finally {
        matchCard.dataset.timelineLoading = '0';
      }
    }

    function updatePopoverPlacement(matchCard) {
      if (!matchCard) return;

      matchCard.classList.remove('timeline-below');
      const rect = matchCard.getBoundingClientRect();
      const approximatePopoverHeight = 190;
      const neededTopSpace = approximatePopoverHeight + 12;

      if (rect.top < neededTopSpace) {
        matchCard.classList.add('timeline-below');
      }
    }

    function renderLoading() {
      matchesContainer.innerHTML = `
        <div class="skeleton-list" aria-label="Loading match history">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      `;
    }

    async function loadHistory(page = 1) {
      const gameName = gameNameInput.value.trim();
      const tagLine = tagLineInput.value.trim();

      if (!gameName || !tagLine) {
        statusText.textContent = 'Enter both game name and tag line.';
        return;
      }

      loadBtn.disabled = true;
      prevPageBtn.disabled = true;
      nextPageBtn.disabled = true;
      statusText.textContent = 'Loading...';
      renderWarning('');
      renderLoading();

      try {
        const response = await fetch(
          `/api/summoner?gameName=${encodeURIComponent(gameName)}&tagLine=${encodeURIComponent(tagLine)}&page=${encodeURIComponent(page)}&pageSize=${PAGE_SIZE}`
        );

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to load summoner data');
        }

        currentPage = data.pagination?.page || page;
        totalPages = data.pagination?.totalPages || 1;

        currentPuuid = data?.account?.puuid || '';
        renderPlayerHeader(data);
        renderPlayerOverview(buildPlayerOverview(data));
        renderWarning(data.rankedWarning || '');
        renderMatches(data);
        renderPagination(data.pagination);
        statusText.textContent = `Loaded successfully. Page ${currentPage}/${totalPages}.`;
      } catch (error) {
        currentPuuid = '';
        playerOverviewWrap.style.display = 'none';
        playerHeader.innerHTML = '';
        overviewCards.innerHTML = '';
        topChampions.innerHTML = '';
        recentForm.innerHTML = '';
        renderWarning('');
        paginationBar.style.display = 'none';
        matchesContainer.innerHTML = `
          <div class="empty-state">${escapeHtml(error.message || 'Something went wrong.')}</div>
        `;
        statusText.textContent = 'Load failed.';
      } finally {
        loadBtn.disabled = false;
      }
    }

    loadBtn.addEventListener('click', () => loadHistory(1));

    prevPageBtn.addEventListener('click', () => {
      if (currentPage > 1) loadHistory(currentPage - 1);
    });

    nextPageBtn.addEventListener('click', () => {
      if (currentPage < totalPages) loadHistory(currentPage + 1);
    });

    [gameNameInput, tagLineInput].forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loadHistory(1);
      });
    });

    matchesContainer.addEventListener('mouseenter', (e) => {
      const card = e.target.closest('.match-card');
      if (card) {
        updatePopoverPlacement(card);
        ensureTimeline(card);
      }
    }, true);

    matchesContainer.addEventListener('focusin', (e) => {
      const card = e.target.closest('.match-card');
      if (card) {
        updatePopoverPlacement(card);
        ensureTimeline(card);
      }
    });

    (async function boot() {
      await initDragonVersion();
      loadHistory(1);
    })();
  </script>
  <script src="/assets/js/page-transitions.js"></script>
</body>
</html>
